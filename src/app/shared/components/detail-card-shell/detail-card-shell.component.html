<div class="flex flex-col h-full bg-surface-0 dark:bg-surface-900 relative">
  <!-- Header -->
  <div
    class="bg-surface-50 dark:bg-surface-800 px-6 py-4 border-b border-surface flex justify-between items-center shrink-0 z-10">
    <!-- Title & Extra Info -->
    <div class="flex items-center gap-3 overflow-hidden flex-1 min-w-0">
      <h2 class="text-xl font-bold mg-text m-0 truncate" [title]="title">
        {{ title }}
      </h2>
      <div class="shrink-0 flex items-center">
        <ng-content select="[header-extra]"></ng-content>
      </div>
    </div>

    <!-- Actions & Close -->
    <div class="flex items-center gap-1 shrink-0 ml-4">
      <!-- Custom Actions Slot -->
      <ng-content select="[header-actions]"></ng-content>

      <!-- Standard Close Button -->
      <button
        (click)="close.emit()"
        class="w-8 h-8 rounded-full bg-surface-100 dark:bg-surface-700 flex items-center justify-center mg-icon-muted hover:text-surface-600 dark:hover:text-surface-200 transition-colors ml-2 cursor-pointer"
        aria-label="Cerrar panel">
        <app-icon name="close" size="sm"></app-icon>
      </button>
    </div>
  </div>

  <!-- Main Content (Scrollable) -->
  <div class="flex-1 overflow-y-auto overflow-x-hidden custom-scrollbar bg-surface-0 dark:bg-surface-900 relative">
    <div class="px-6 py-6 pb-24 md:pb-8">
      <ng-content></ng-content>
    </div>
  </div>

  <!-- Footer (Optional Slot) -->
  <!-- We wrap it in a checking container if we want to conditionally hide borders,
       but CSS :empty selector is tricky with ng-content.
       For now, we assume if the user puts a footer, they handle the container or we just provide a slot.
       But standard footer styling implies: -->
  <div
    class="shrink-0 border-t border-surface bg-surface-50 dark:bg-surface-800 p-4 flex justify-end gap-2 z-10 sticky bottom-0"
    style="display: none"
    [style.display]="footer.children.length > 0 ? 'flex' : 'none'"
    #footer>
    <ng-content select="[footer]"></ng-content>
  </div>
</div>
