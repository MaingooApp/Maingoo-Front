<div class="space-y-3">
  <h3 class="text-lg font-semibold flex items-center gap-2 mg-text">
    <app-icon name="info" size="md" class="text-primary"></app-icon>
    Detalles del producto
  </h3>
  <div class="bg-surface-50 dark:bg-surface-800 p-4 rounded-content border border-surface space-y-2 text-sm mg-text">
    <div class="flex flex-col gap-1">
      <div class="flex items-center gap-2">
        <label class="font-bold mg-text">Descripción:</label>
        <ng-container *ngxPermissionsOnly="[P.ProductsWrite]">
          <button
            *ngIf="!isEditing"
            (click)="startEditing()"
            class="text-primary hover:mg-text transition-colors p-1 rounded-full hover:bg-surface-100 dark:bg-surface-800">
            <app-icon name="edit" size="xs"></app-icon>
          </button>
        </ng-container>
      </div>

      <div *ngIf="!isEditing" class="text-surface-600 dark:text-surface-300 min-h-[1.5rem]">
        {{ product?.description || 'Sin descripción' }}
      </div>

      <div *ngIf="isEditing" class="flex flex-col gap-2 animate-fade-in">
        <textarea
          pInputTextarea
          [(ngModel)]="tempDescription"
          rows="3"
          class="w-full text-sm p-2 border border-surface rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all hover:border-surface bg-surface-0 dark:bg-surface-900"
          placeholder="Añadir descripción..."
          [autoResize]="true"></textarea>
        <div class="flex justify-end gap-2">
          <button
            (click)="cancelEditing()"
            class="text-xs px-3 py-1.5 rounded-lg border border-surface mg-text-muted hover:bg-surface-50 dark:bg-surface-800 font-medium transition-colors">
            Cancelar
          </button>
          <button
            (click)="saveDescription()"
            class="text-xs px-3 py-1.5 rounded-lg bg-primary text-primary-contrast hover:bg-primary-emphasis font-medium transition-colors flex items-center gap-1">
            <app-icon name="check" size="xs"></app-icon>
            Guardar
          </button>
        </div>
      </div>
    </div>
    <p>
      <strong class="mg-text">Producto añadido el:</strong>
      {{ product?.createdAt | date: 'dd/MM/yyyy HH:mm' }}
    </p>
  </div>
</div>
