<div class="space-y-3 pt-4 border-t border-surface">
  <h3 class="text-lg font-semibold flex items-center gap-2 mg-text">
    <app-icon name="description" size="md" class="text-primary"></app-icon>
    Facturas asociadas ({{ invoices.length }})
  </h3>

  <div *ngIf="invoices.length > 0; else noInvoices" class="space-y-2">
    <div
      *ngFor="let invoice of invoices"
      class="p-3 bg-surface-0 dark:bg-surface-900 border border-surface rounded-content hover:border-primary transition-colors flex justify-between items-center group cursor-pointer"
      (click)="viewInvoice.emit(invoice)">
      <div class="flex flex-col">
        <span class="font-medium mg-text text-sm">{{ invoice.supplier.name || 'Proveedor desconocido' }}</span>
        <span class="text-xs mg-text-muted"
          >{{ invoice.date | date: 'dd MMM yyyy' }} • {{ invoice.invoiceNumber }}</span
        >
      </div>
      <div class="flex items-center gap-3">
        <span class="font-bold mg-text text-sm">{{ invoice.amount | currency: 'EUR' }}</span>
        <app-icon name="chevron_right" size="md" class="mg-icon-muted group-hover:text-primary"></app-icon>
      </div>
    </div>
  </div>

  <ng-template #noInvoices>
    <div
      class="p-4 rounded-content bg-surface-50 dark:bg-surface-800 mg-text-muted text-sm text-center italic border border-dashed border-surface">
      No se han encontrado facturas para este producto.
    </div>
  </ng-template>
</div>
