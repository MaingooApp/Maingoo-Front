<div *ngIf="data" class="space-y-3 pt-4 border-t border-surface">
  <div class="flex items-center justify-between mb-2">
    <h3 class="text-lg font-semibold flex items-center gap-2 mg-text">
      <app-icon name="show_chart" size="md" class="text-primary"></app-icon>
      {{ title }}
    </h3>
    <p-select
      [options]="priceOptions"
      [(ngModel)]="selectedPriceType"
      (onChange)="updateChartData()"
      optionLabel="label"
      optionValue="value"
      styleClass="w-40 !text-sm"
      panelStyleClass="!text-sm"
      appendTo="body"></p-select>
  </div>
  <div class="h-48 w-full bg-surface-50 dark:bg-surface-800/50 rounded-content p-2 border border-dashed border-surface">
    <p-chart type="line" [data]="currentData" [options]="options" height="100%" width="100%"></p-chart>
  </div>
</div>
