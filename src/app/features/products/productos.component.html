<div class="flex flex-col gap-6 relative items-start p-6 -m-6">
  <div class="flex-1 w-full min-w-0">
    <!-- MOBILE: Header Controls (Floating) -->
    <div
      class="flex md:hidden justify-between items-start mb-4 sticky top-0 z-20 pointer-events-none"
      *ngIf="productos.length > 0">
      <!-- Left: Search -->
      <div
        class="pointer-events-auto flex items-center gap-2 transition-all duration-300 ease-out"
        [class.w-full]="showMobileSearch"
        [class.mr-[165px]]="showMobileSearch">
        <button
          class="flex items-center justify-center rounded-full w-12 h-12 text-surface-600 dark:text-surface-300 bg-surface-0/90 dark:bg-surface-800/90 backdrop-blur-sm shadow-sm border border-surface transition-all duration-200"
          [class.bg-primary]="showMobileSearch"
          [class.text-primary-contrast]="showMobileSearch"
          [class.border-transparent]="showMobileSearch"
          (click)="showMobileSearch = !showMobileSearch">
          <app-icon name="search" size="md"></app-icon>
        </button>

        <input
          *ngIf="showMobileSearch"
          type="text"
          pInputText
          placeholder="Buscar producto..."
          class="flex-1 h-12 shadow-lg rounded-full border-none pl-5 pr-4 text-base animate-fade-in bg-surface-0/95 dark:bg-surface-800/95 backdrop-blur-sm"
          (input)="filterProductos($event)"
          autofocus />
      </div>

      <!-- Right: Actions Group -->
      <div class="pointer-events-auto absolute right-0 top-0 flex items-center gap-3 shrink-0">
        <!-- Delete All (Mobile) -->
        <button
          *ngxPermissionsOnly="[P.ProductsDelete]"
          class="w-12 h-12 rounded-full bg-surface-0/90 dark:bg-surface-800/90 backdrop-blur-sm shadow-sm border border-surface text-red-500 flex items-center justify-center active:scale-95 transition-all"
          (click)="eliminarTodo()">
          <app-icon name="delete" size="md"></app-icon>
        </button>

        <!-- View Toggle Switch -->
        <div
          class="bg-surface-0/90 dark:bg-surface-800/90 backdrop-blur-sm shadow-sm border border-surface rounded-full h-12 p-1 flex items-center gap-1">
          <button
            class="w-10 h-full rounded-full flex items-center justify-center transition-all duration-200"
            [class.bg-primary]="viewMode === 'list'"
            [class.text-primary-contrast]="viewMode === 'list'"
            [class.mg-text-muted]="viewMode !== 'list'"
            (click)="setViewMode('list')">
            <app-icon name="view_headline" size="sm"></app-icon>
          </button>
          <button
            class="w-10 h-full rounded-full flex items-center justify-center transition-all duration-200"
            [class.bg-primary]="viewMode === 'cards'"
            [class.text-primary-contrast]="viewMode === 'cards'"
            [class.mg-text-muted]="viewMode !== 'cards'"
            (click)="setViewMode('cards')">
            <app-icon name="grid_view" size="sm"></app-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- GLOBAL HEADER TEMPLATE (Projected to Layout Shell) -->
    <ng-template #headerTpl>
      <app-products-section-header-detail
        [productos]="productos"
        [viewMode]="viewMode"
        [cargando]="cargando"
        (viewModeChange)="setViewMode($event)"
        (search)="filterProductos($event)"
        (addInvoice)="openAddInvoiceModal()"
        (deleteAll)="eliminarTodo()">
      </app-products-section-header-detail>
    </ng-template>

    <!-- SECTION: Empty State -->
    <div *ngIf="!cargando && productos.length === 0; else contenidoPrincipal">
      <app-empty-state
        icon="warehouse"
        title="No hay productos en tu almacén"
        description="Cuando escanees o subas una factura, esos productos, aparecerá aquí.">
      </app-empty-state>
    </div>

    <!-- SECTION: Main Layout (Table/Grid) -->
    <ng-template #contenidoPrincipal>
      <!-- LOADING: Skeleton States -->
      <ng-container *ngIf="cargando">
        <!-- Skeleton List View -->
        <app-skeleton *ngIf="viewMode === 'list'" mode="list" [count]="8"></app-skeleton>

        <!-- Skeleton Cards View (Categories) -->
        <app-skeleton *ngIf="viewMode === 'cards'" mode="grid" [count]="8"></app-skeleton>
      </ng-container>

      <!-- LOADED: Actual Content -->
      <ng-container *ngIf="!cargando">
        <!-- VIEW: List Mode & VIEW: Grid Mode Wrapper -->
        <div
          class="flex relative items-start"
          [class.gap-6]="!(selectedCategory && selectedProduct)"
          [class.gap-0]="selectedCategory && selectedProduct">
          <div
            [ngClass]="
              selectedCategory && selectedProduct ? 'w-0 overflow-hidden opacity-0 flex-none' : 'flex-1 min-w-0'
            "
            class="">
            <!-- VIEW: List Mode -->
            <div *ngIf="viewMode === 'list'">
              <app-product-list
                [products]="filteredProducts"
                [selectedProduct]="selectedProduct"
                [loading]="cargando"
                (selectProduct)="showDialog($event)"></app-product-list>
            </div>

            <!-- VIEW: Cards Mode (Root Categories) -->
            <div
              *ngIf="viewMode === 'cards'"
              class="grid gap-3 md:gap-6 animate-fade-in"
              [ngClass]="
                selectedCategory || selectedProduct ? 'grid-cols-1' : 'grid-cols-2 sm:grid-cols-3 lg:grid-cols-4'
              ">
              <app-product-card
                *ngFor="let group of filteredProductGroups"
                [group]="group"
                [isSelected]="selectedCategory === group.rootCategory.name"
                (cardClick)="selectCategory(group.rootCategory.name)">
              </app-product-card>
            </div>
          </div>

          <!-- SECTION: Unified Sidebar (Expanding Cards) -->
          <div
            *ngIf="selectedCategory || selectedProduct"
            [ngClass]="{
              'w-0 overflow-hidden opacity-0': !selectedCategory && !selectedProduct,
              'w-full md:w-3/4': (selectedCategory || selectedProduct) && !(selectedCategory && selectedProduct),
              'w-full': selectedCategory && selectedProduct
            }"
            class="hidden md:flex shrink-0 sticky top-4 h-[calc(100vh-2rem)] gap-6 z-20">
            <!-- Category Layer (Product List Card) -->
            <div
              *ngIf="selectedCategory"
              [ngClass]="selectedProduct ? 'flex-1 min-w-0' : 'w-full'"
              class="h-full flex flex-col relative shrink-0">
              <app-category-detail
                class="h-full"
                [categoryName]="selectedCategory"
                [products]="categoryProducts"
                [selectedProduct]="selectedProduct"
                (close)="closeCategoryDetail()"
                (selectProduct)="showDialog($event)"></app-category-detail>
            </div>

            <!-- Product Layer (Product Detail Card) -->
            <div
              *ngIf="selectedProduct"
              class="flex-1 h-full rounded-content overflow-hidden shadow-2xl bg-surface-0 dark:bg-surface-900 flex flex-col relative">
              <app-detail-card-shell [title]="selectedProduct.name || 'Detalle de Producto'" (close)="hideDialog()">
                <div header-actions class="flex items-center gap-1">
                  <button
                    *ngxPermissionsOnly="[P.ProductsDelete]"
                    pButton
                    class="p-button-rounded p-button-text p-button-danger"
                    pTooltip="Eliminar producto"
                    tooltipPosition="bottom"
                    (click)="confirmarEliminarProducto(selectedProduct)">
                    <app-icon name="delete" size="md"></app-icon>
                  </button>
                </div>
                <app-product-detail class="w-full h-full" [product]="selectedProduct" (verFactura)="verFactura($event)">
                </app-product-detail>
              </app-detail-card-shell>
            </div>
          </div>

          <!-- MOBILE: Bottom Sheets (Keep Separate) -->

          <!-- Mobile Sheets moved to bottom -->
        </div>
        <!-- End of Row Wrapper -->
      </ng-container>
    </ng-template>
  </div>

  <!-- Mobile FAB (Floating Action Button) - Bottom Left -->
  <button
    *ngxPermissionsOnly="[P.DocumentsWrite]"
    class="mg-mobile-fab"
    (click)="openAddInvoiceModal()"
    pTooltip="Subir factura"
    tooltipPosition="right">
    <app-icon name="add" size="xl"></app-icon>
  </button>
</div>
<!-- End of Main Container -->

<!-- MOVED MODALS -->

<!-- Category Mobile Sheet (Right Slide-over) -->
<ng-container *ngIf="selectedCategory">
  <div class="md:hidden fixed top-0 left-0 w-screen h-[100dvh] z-[3000] flex items-start justify-end overflow-hidden">
    <!-- Backdrop -->
    <div class="mg-mobile-backdrop" (click)="closeCategoryDetail()"></div>

    <!-- Panel -->
    <div
      class="relative w-full h-full bg-surface-50 dark:bg-surface-800 shadow-2xl flex flex-col animate-slide-left overflow-hidden max-w-[100vw]"
      (touchstart)="onTouchStart($event)"
      (touchend)="onTouchEnd($event)">
      <!-- Header -->
      <div
        class="flex items-center justify-center px-4 py-3 bg-surface-0 dark:bg-surface-900 border-b border-surface shrink-0 sticky top-0 z-10 w-full relative">
        <h2
          class="text-lg font-bold truncate max-w-[70%] px-4 py-1.5 rounded-full transition-colors flex items-center justify-center"
          [ngStyle]="getCategoryStyle(selectedCategory)">
          {{ selectedCategory }}
        </h2>
        <button
          class="absolute right-4 w-8 h-8 rounded-full bg-surface-100 dark:bg-surface-800 mg-text-muted flex items-center justify-center active:bg-surface-200 dark:active:bg-surface-600 transition-colors shrink-0"
          (click)="closeCategoryDetail()">
          <app-icon name="close" size="sm"></app-icon>
        </button>
      </div>

      <!-- Content (Grid) -->
      <div class="flex-1 overflow-y-auto overflow-x-hidden p-4 pb-20 w-full">
        <div class="grid grid-cols-2 gap-3">
          <app-product-card *ngFor="let item of categoryProducts" [product]="item" (cardClick)="showDialog(item)">
          </app-product-card>
        </div>
      </div>

      <!-- Footer Navigation (Dots) -->
      <div class="fixed bottom-6 left-0 right-0 flex justify-center z-20 pointer-events-none">
        <div
          class="bg-black/40 backdrop-blur-md rounded-full px-4 py-2 flex items-center gap-2 pointer-events-auto shadow-lg">
          <button
            class="w-6 h-6 rounded-full flex items-center justify-center text-primary-contrast/80 active:text-primary-contrast"
            (click)="prevCategory()">
            <app-icon name="chevron_left" size="xs"></app-icon>
          </button>

          <div class="flex items-center gap-1.5 overflow-x-auto max-w-[120px] no-scrollbar px-1">
            <div
              *ngFor="let cat of uniqueCategories; let i = index"
              class="w-1.5 h-1.5 rounded-full transition-all duration-300 shrink-0"
              [ngClass]="
                currentCategoryIndex === i
                  ? 'bg-surface-0 dark:bg-surface-900 scale-125'
                  : 'bg-surface-0 dark:bg-surface-900/30'
              "></div>
          </div>

          <button
            class="w-6 h-6 rounded-full flex items-center justify-center text-primary-contrast/80 active:text-primary-contrast"
            (click)="nextCategory()">
            <app-icon name="chevron_right" size="xs"></app-icon>
          </button>
        </div>
      </div>
    </div>
  </div>
</ng-container>

<!-- Product Mobile Sheet -->
<ng-container *ngIf="selectedProduct">
  <div class="mg-mobile-overlay z-[3001]">
    <div class="mg-mobile-backdrop" (click)="hideDialog()"></div>
    <div class="mg-bottom-sheet">
      <div class="mg-bottom-sheet-handle" (click)="hideDialog()">
        <div class="mg-bottom-sheet-handle-bar"></div>
      </div>
      <app-detail-card-shell [title]="selectedProduct.name || 'Detalle de Producto'" (close)="hideDialog()">
        <app-product-detail
          class="w-full h-full"
          [product]="selectedProduct"
          (verFactura)="verFactura($event)"></app-product-detail>
      </app-detail-card-shell>
    </div>
  </div>
</ng-container>
