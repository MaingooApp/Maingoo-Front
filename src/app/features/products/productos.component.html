<div class="flex flex-col gap-6 relative items-start h-full min-h-0 overflow-hidden p-6 -m-6">
  <div class="flex flex-col flex-1 h-full min-h-0 w-full min-w-0">
    <!-- GLOBAL HEADER TEMPLATE (Projected to Layout Shell) -->
    <ng-template #headerTpl>
      <app-products-section-header-detail
        [productos]="productos"
        [cargando]="cargando"
        (search)="filterProductos($event)"
        (addInvoice)="openAddInvoiceModal()"
        (deleteAll)="eliminarTodo()">
      </app-products-section-header-detail>
    </ng-template>

    <!-- SECTION: Empty State -->
    <div *ngIf="!cargando && productos.length === 0; else contenidoPrincipal">
      <app-empty-state
        icon="warehouse"
        title="No hay productos en tu almacén"
        description="Cuando escanees o subas una factura, esos productos, aparecerá aquí.">
      </app-empty-state>
    </div>

    <!-- SECTION: Main Layout (Table/Grid) -->
    <ng-template #contenidoPrincipal>
      <!-- LOADING: Skeleton States -->
      <ng-container *ngIf="cargando">
        <!-- Skeleton Cards View (Categories) -->
        <app-skeleton mode="grid" [count]="8"></app-skeleton>
      </ng-container>

      <!-- LOADED: Actual Content -->
      <ng-container *ngIf="!cargando">
        <!-- VIEW: List Mode & VIEW: Grid Mode Wrapper -->
        <div
          class="flex flex-1 min-h-0 relative items-start overflow-hidden pb-4 box-border"
          [class.gap-6]="!(selectedCategory && selectedProduct)"
          [class.gap-0]="selectedCategory && selectedProduct">
          <div
            [ngClass]="
              selectedCategory && selectedProduct ? 'w-0 overflow-hidden opacity-0 flex-none' : 'flex-1 min-w-0'
            "
            class="h-full min-h-0 overflow-y-auto overflow-x-hidden custom-scrollbar">
            <!-- VIEW: Cards Mode (Root Categories) -->
            <div
              class="grid gap-3 md:gap-6 animate-fade-in"
              [ngClass]="
                selectedCategory || selectedProduct ? 'grid-cols-1' : 'grid-cols-2 sm:grid-cols-3 lg:grid-cols-4'
              ">
              <app-product-card
                *ngFor="let group of filteredProductGroups"
                [group]="group"
                [isSelected]="selectedCategory === group.rootCategory.name"
                (cardClick)="selectCategory(group.rootCategory.name)">
              </app-product-card>
            </div>
          </div>

          <!-- SECTION: Unified Sidebar (Expanding Cards) -->
          <div
            *ngIf="selectedCategory || selectedProduct"
            [ngClass]="{
              'w-0 overflow-hidden opacity-0': !selectedCategory && !selectedProduct,
              'w-full md:w-3/4': (selectedCategory || selectedProduct) && !(selectedCategory && selectedProduct),
              'w-full': selectedCategory && selectedProduct
            }"
            class="hidden md:flex shrink-0 h-full min-h-0 gap-6 z-20 overflow-hidden">
            <!-- Category Layer (Product List Card) -->
            <div
              *ngIf="selectedCategory"
              [ngClass]="selectedProduct ? 'flex-1 min-w-0' : 'w-full'"
              class="h-full min-h-0 flex flex-col relative shrink-0">
              <app-category-detail
                class="h-full min-h-0 w-full"
                [categoryName]="selectedCategory"
                [products]="categoryProducts"
                [selectedProduct]="selectedProduct"
                (close)="closeCategoryDetail()"
                (selectProduct)="showDialog($event)"
                (deleteProduct)="confirmarEliminarProducto($event)"></app-category-detail>
            </div>

            <!-- Product Layer (Product Detail Card) -->
            <div
              *ngIf="selectedProduct"
              class="flex-1 h-full min-h-0 rounded-content overflow-hidden shadow-lg bg-surface-0 dark:bg-surface-900 flex flex-col relative">
              <app-detail-card-shell [title]="selectedProduct.name || 'Detalle de Producto'" (close)="hideDialog()">
                <div header-actions class="flex items-center gap-1">
                  <button
                    *ngxPermissionsOnly="[P.ProductsDelete]"
                    pButton
                    class="p-button-rounded p-button-text p-button-danger"
                    pTooltip="Eliminar producto"
                    tooltipPosition="bottom"
                    (click)="confirmarEliminarProducto(selectedProduct)">
                    <app-icon name="delete" size="md"></app-icon>
                  </button>
                </div>
                <app-product-detail class="w-full h-full" [product]="selectedProduct" (verFactura)="verFactura($event)">
                </app-product-detail>
              </app-detail-card-shell>
            </div>
          </div>
        </div>
        <!-- End of Row Wrapper -->
      </ng-container>
    </ng-template>
  </div>
</div>
<!-- End of Main Container -->
