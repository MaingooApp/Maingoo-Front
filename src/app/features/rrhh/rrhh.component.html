<div class="flex flex-col gap-6 relative items-start min-h-screen p-6 -m-6">
  <div class="flex-1 w-full min-w-0 transition-all duration-300">
    <!-- GLOBAL HEADER TEMPLATE (Projected to Layout Shell) -->
    <ng-template #headerTpl>
      <app-rrhh-section-header-detail (search)="onSearch($event)"> </app-rrhh-section-header-detail>
    </ng-template>

    <!-- KPI Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div
        *ngFor="let kpi of kpis"
        class="bg-surface-0 dark:bg-surface-900 p-4 rounded-content border border-surface shadow-sm flex items-center justify-between">
        <div>
          <span class="block mg-text-muted text-sm font-medium mb-1">{{ kpi.label }}</span>
          <span class="text-2xl font-bold mg-text">{{ kpi.value }}</span>
        </div>
        <div [class]="kpi.bg + ' p-3 rounded-full'">
          <i [class]="kpi.icon + ' ' + kpi.color + ' text-xl'"></i>
        </div>
      </div>
    </div>

    <!-- Cards View -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div
        *ngFor="let employee of filteredEmployees"
        class="bg-surface-0 dark:bg-surface-900 rounded-content border border-surface shadow-sm hover:shadow-md transition-shadow p-6 flex flex-col items-center text-center relative group">
        <!-- Status Badge -->
        <div class="absolute top-4 right-4">
          <p-tag [severity]="getSeverity(employee.status)" [rounded]="true"></p-tag>
        </div>

        <!-- Avatar -->
        <p-avatar
          [image]="employee.avatar"
          [label]="!employee.avatar ? employee.name.charAt(0) : ''"
          shape="circle"
          size="xlarge"
          [styleClass]="'mb-4 ' + (!employee.avatar ? 'bg-primary/10 text-primary text-xl' : '')">
        </p-avatar>

        <!-- Info -->
        <h3 class="font-bold text-lg mg-text mb-1">{{ employee.name }}</h3>
        <p class="text-sm mg-text-muted mb-4">{{ employee.role }} · {{ employee.department }}</p>

        <!-- Contact Info -->
        <div class="w-full flex flex-col gap-2 mb-6">
          <div
            class="flex items-center justify-center gap-2 text-sm text-surface-600 dark:text-surface-300 bg-surface-50 dark:bg-surface-800 py-2 rounded-lg">
            <i class="pi pi-envelope text-xs"></i>
            <span class="truncate max-w-[180px]">{{ employee.email }}</span>
          </div>
          <div
            class="flex items-center justify-center gap-2 text-sm text-surface-600 dark:text-surface-300 bg-surface-50 dark:bg-surface-800 py-2 rounded-lg">
            <i class="pi pi-phone text-xs"></i>
            <span>{{ employee.phone }}</span>
          </div>
        </div>

        <!-- Actions -->
        <div class="w-full grid grid-cols-2 gap-3 mt-auto">
          <button
            pButton
            label="Turnos"
            icon="pi pi-calendar"
            class="p-button-outlined p-button-sm p-button-secondary w-full"></button>
          <button pButton label="Editar" icon="pi pi-pencil" class="p-button-sm p-button-primary w-full"></button>
        </div>
      </div>

      <!-- Empty State for Cards -->
      <div *ngIf="filteredEmployees.length === 0" class="col-span-full">
        <app-empty-state
          icon="group"
          title="No hay empleados"
          description="No se han encontrado empleados que coincidan con la búsqueda."
          [showComingSoon]="false">
        </app-empty-state>
      </div>
    </div>
  </div>
</div>
