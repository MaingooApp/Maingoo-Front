<div class="flex items-center justify-between w-full h-full gap-4 overflow-x-auto no-scrollbar">
  <!-- Left: Title & Actions -->
  <div class="flex items-center gap-4 shrink-0">
    <h2 class="text-2xl font-bold mg-text m-0 whitespace-nowrap">Equipo</h2>
    <span class="mg-demo-badge">DEMO</span>

    <!-- Actions -->
    <button pButton label="Nuevo Empleado" severity="primary" (click)="onAddEmployee()" class="whitespace-nowrap">
      <app-icon name="add" size="md" class="mr-2"></app-icon>
    </button>
  </div>

  <!-- Right: Search -->
  <div class="flex items-center justify-end shrink-0">
    <input
      type="text"
      pInputText
      placeholder="Buscar empleado..."
      (input)="onSearch($event)"
      class="border-surface rounded-lg focus:border-primary focus:ring-primary w-96 placeholder:text-surface-400 placeholder:text-base text-left" />
  </div>
</div>
