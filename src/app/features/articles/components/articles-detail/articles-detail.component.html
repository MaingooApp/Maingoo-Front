<app-detail-card-shell [title]="shellTitle" (close)="onClose()">
  <div header-actions class="flex items-center gap-1">
    <ng-container *ngxPermissionsOnly="[P.FoodPreparationsWrite]">
      <button
        *ngIf="preparationsComponent?.selectedPreparation() && !preparationsComponent?.isEditMode()"
        pButton
        class="p-button-text p-button-rounded mg-text-muted hover:text-primary"
        aria-label="Editar"
        (click)="preparationsComponent?.toggleEditMode()">
        <app-icon name="edit" size="md"></app-icon>
      </button>
    </ng-container>
    <ng-container *ngxPermissionsOnly="[P.FoodPreparationsDelete]">
      <button
        *ngIf="preparationsComponent?.selectedPreparation() && !preparationsComponent?.isEditMode()"
        pButton
        class="p-button-rounded p-button-text p-button-danger"
        aria-label="Eliminar"
        (click)="onDeletePreparation()">
        <app-icon name="delete" size="md"></app-icon>
      </button>
    </ng-container>
  </div>

  <!-- Content -->
  <div class="flex flex-col gap-4">
    <!-- Elaborations -->
    <app-preparations-content
      #preparationsComponent
      *ngIf="selectedCategory === 'elaborations'"
      type="elaboration"
      [availableProducts]="availableProducts"
      [searchTerm]="searchTerm">
    </app-preparations-content>

    <!-- Articles -->
    <app-preparations-content
      #preparationsComponent
      *ngIf="selectedCategory === 'articles'"
      type="article"
      [availableProducts]="availableProducts"
      [searchTerm]="searchTerm">
    </app-preparations-content>

    <!-- Equipment -->
    <div *ngIf="selectedCategory === 'equipment'" class="grid grid-cols-1 xl:grid-cols-2 gap-5 items-start">
      <section *ngxPermissionsOnly="[P.UtensilsRead]" class="mg-surface-muted rounded-content p-4">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-full bg-green-50 text-green-500 flex items-center justify-center shrink-0">
            <app-icon name="restaurant" size="md"></app-icon>
          </div>
          <div class="min-w-0">
            <h3 class="text-base font-semibold mg-text m-0">Utensilios</h3>
            <p class="text-xs mg-text-muted m-0">Herramientas usadas en las elaboraciones.</p>
          </div>
        </div>
        <app-catalog-content type="utensil" [searchTerm]="searchTerm"></app-catalog-content>
      </section>

      <section *ngxPermissionsOnly="[P.MachineryRead]" class="mg-surface-muted rounded-content p-4">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-full bg-teal-50 text-teal-500 flex items-center justify-center shrink-0">
            <app-icon name="precision_manufacturing" size="md"></app-icon>
          </div>
          <div class="min-w-0">
            <h3 class="text-base font-semibold mg-text m-0">Maquinaria</h3>
            <p class="text-xs mg-text-muted m-0">Equipos disponibles para preparar artículos.</p>
          </div>
        </div>
        <app-catalog-content type="machinery" [searchTerm]="searchTerm"></app-catalog-content>
      </section>
    </div>
  </div>
</app-detail-card-shell>
