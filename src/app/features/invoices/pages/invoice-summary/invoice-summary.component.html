<div class="flex flex-col gap-6 relative items-start min-h-screen p-6 -m-6">
  <!-- GLOBAL HEADER TEMPLATE (Projected to Layout Shell) -->
  <ng-template #headerTpl>
    <app-invoice-summary-section-header-detail
      (search)="searchTerm.set(getInputValue($event))"
      (addInvoice)="openAddInvoiceModal()">
    </app-invoice-summary-section-header-detail>
  </ng-template>

  <div class="w-full">
    <div *ngIf="invoices().length === 0; else tablaFacturas">
      <app-empty-state
        icon="inbox"
        title="No hay facturas registradas"
        description="Cuando registres una factura, aparecerá aquí.">
      </app-empty-state>
    </div>

    <ng-template #tablaFacturas>
      <div class="card rounded-content shadow-md p-6 bg-surface-0 dark:bg-surface-900">
        <app-tabla-dinamica
          [data]="invoices()"
          [columns]="columns"
          [loading]="loading()"
          [globalFilterFields]="['supplier.name', 'invoiceNumber']"
          [actions]="actions()"
          (actionClick)="handleAccion($event)"
          [exportPdf]="true"
          [exportFilename]="'facturas'">
        </app-tabla-dinamica>
      </div>
    </ng-template>
  </div>
</div>
