@if (issue(); as subscriptionIssue) {
  <section class="flex-none px-4 pb-3">
    <div
      class="rounded-content border px-4 py-3 shadow-sm"
      [ngClass]="toneClass()"
      role="status"
      aria-live="polite">
      <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
        <div class="flex min-w-0 items-start gap-3">
          <div class="mt-0.5 flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-surface-0/70 dark:bg-surface-900/50">
            <app-icon [name]="icon()" size="xl"></app-icon>
          </div>

          <div class="min-w-0">
            <p class="m-0 text-sm font-semibold">{{ title() }}</p>
            <p class="m-0 mt-1 text-sm opacity-85">{{ detail() }}</p>
            <p class="m-0 mt-1 text-[11px] font-mono opacity-75">Estado: {{ subscriptionIssue.status }}</p>
          </div>
        </div>

        <div class="flex shrink-0 items-center gap-2 self-start md:self-center">
          <button
            pButton
            type="button"
            severity="secondary"
            size="small"
            class="p-button-sm"
            [disabled]="subscriptionState.loading()"
            (click)="refresh()">
            <app-icon name="refresh" size="sm" class="mr-1"></app-icon>
            Actualizar
          </button>
          <a pButton routerLink="/suscripcion" size="small" class="p-button-sm no-underline">
            <app-icon name="credit_card" size="sm" class="mr-1"></app-icon>
            Gestionar
          </a>
        </div>
      </div>
    </div>
  </section>
}
