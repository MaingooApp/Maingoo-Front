<app-card-shell [isSelected]="isSelected" (click)="handleClick()">
  <!-- Header: Name -->
  <div class="flex flex-col mb-1 mg-text">
    <span class="font-bold text-lg truncate" [title]="supplier.name">{{ supplier.name }}</span>
    <span class="text-xs mg-text-muted font-normal" *ngIf="supplier.sanitaryRegistrationNumber">{{
      supplier.sanitaryRegistrationNumber
    }}</span>
    <span class="text-xs mg-icon-muted italic font-normal" *ngIf="!supplier.sanitaryRegistrationNumber"
      >Sin registro sanitario</span
    >
  </div>

  <!-- Details List -->
  <div class="flex flex-col gap-2 text-sm text-surface-600 dark:text-surface-300">
    <!-- Contact Name -->
    <div class="flex items-center gap-2">
      <app-icon name="person" size="xs" class="text-primary w-4"></app-icon>
      <span class="truncate" *ngIf="supplier.commercialName">{{ supplier.commercialName }}</span>
      <span class="truncate mg-icon-muted italic" *ngIf="!supplier.commercialName">Sin nombre comercial</span>
    </div>
    <!-- Phone -->
    <div class="flex items-center gap-2">
      <app-icon name="phone" size="xs" class="text-primary w-4"></app-icon>
      <span class="truncate" *ngIf="supplier.phoneNumber">{{ supplier.phoneNumber }}</span>
      <span class="truncate mg-icon-muted italic" *ngIf="!supplier.phoneNumber">Sin teléfono</span>
    </div>
    <!-- Order Days -->
    <div class="flex items-center gap-2">
      <app-icon name="schedule" size="xs" class="text-primary w-4"></app-icon>
      <span class="truncate" *ngIf="supplier.orderDays">{{ supplier.orderDays }}</span>
      <span class="truncate mg-icon-muted italic" *ngIf="!supplier.orderDays">Sin días pedido</span>
    </div>
    <!-- Delivery Days -->
    <div class="flex items-center gap-2">
      <app-icon name="local_shipping" size="xs" class="text-primary w-4"></app-icon>
      <span class="truncate" *ngIf="supplier.deliveryDays">{{ supplier.deliveryDays }}</span>
      <span class="truncate mg-icon-muted italic" *ngIf="!supplier.deliveryDays">Sin días reparto</span>
    </div>
  </div>
</app-card-shell>
