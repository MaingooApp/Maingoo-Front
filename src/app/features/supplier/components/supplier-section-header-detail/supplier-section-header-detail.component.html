<div class="flex items-center justify-between w-full h-full gap-4 overflow-x-auto no-scrollbar">
  <!-- Left: Title & Actions -->
  <div class="flex items-center gap-4 shrink-0">
    <h2 class="text-2xl font-bold mg-text m-0 whitespace-nowrap">Proveedores</h2>

    <!-- Primary Action -->
    <button
      pButton
      label="Subir Factura"
      severity="primary"
      (click)="onAddInvoice()"
      class="whitespace-nowrap"
      *ngxPermissionsOnly="[P.DocumentsRead]">
      <app-icon name="receipt_long" size="md" class="mr-2"></app-icon>
    </button>
  </div>

  <!-- Right: Search -->
  <div class="flex items-center justify-end shrink-0">
    <input
      *ngIf="supplier.length > 0"
      type="text"
      pInputText
      placeholder="Buscar..."
      (input)="onSearch($event)"
      class="border-surface rounded-lg focus:border-primary focus:ring-primary w-96 placeholder:text-surface-400 placeholder:text-base text-left" />
  </div>
</div>
