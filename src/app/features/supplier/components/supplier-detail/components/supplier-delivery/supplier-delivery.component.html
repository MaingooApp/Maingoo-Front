<div class="group w-full">
  <!-- Inline Toggle Header -->
  <div
    class="grid grid-cols-[130px_1fr] items-center py-1 min-h-[32px] cursor-pointer"
    (click)="!isEditing && (showDelivery = !showDelivery)">
    <div class="flex items-center gap-2 mg-text-muted text-sm">
      <app-icon name="local_shipping" size="md" class="text-primary"></app-icon>
      <span>Reparto</span>
    </div>
    <div class="flex items-center">
      <span *ngIf="!isEditing && hasEmptyDeliveryFields" class="text-xs text-primary/80 italic">
        {{ showDelivery ? 'ocultar campos' : 'mostrar campos' }}
      </span>
    </div>
  </div>

  <div class="overflow-hidden transition-all duration-300 ease-in-out">
    <div class="flex flex-col gap-1 py-1">
      <div class="flex flex-col gap-1 pl-6">
        <!-- Ultimo dia de pedido Chips -->
        <div
          class="grid grid-cols-[130px_1fr] py-1 group min-h-[32px]"
          *ngIf="selectedLastOrderDays.length > 0 || isEditing || showDelivery">
          <div class="flex items-center gap-2 mg-text-muted text-sm h-8">
            <app-icon name="calendar_today" size="md" class="text-primary"></app-icon>
            <span>Día de pedido</span>
          </div>
          <div class="flex flex-wrap gap-1 items-center -ml-2">
            <div
              *ngFor="let day of daysOptions"
              (click)="isEditing && toggleDay('lastOrder', day.value)"
              class="px-2 py-1 rounded text-xs transition-colors border select-none shrink-0"
              [ngClass]="{
                'cursor-pointer': isEditing,
                'cursor-default': !isEditing,
                'bg-primary text-primary-contrast border-primary': isDaySelected('lastOrder', day.value),
                'bg-surface-100 dark:bg-surface-800 mg-text-muted border-transparent':
                  !isDaySelected('lastOrder', day.value) && !isEditing,
                'bg-surface-100 dark:bg-surface-800 mg-text-muted border-transparent hover:bg-surface-200 dark:bg-surface-700':
                  !isDaySelected('lastOrder', day.value) && isEditing
              }">
              {{ day.short }}
            </div>
          </div>
        </div>

        <!-- Dias de reparto Chips -->
        <div
          class="grid grid-cols-[130px_1fr] py-1 group min-h-[32px]"
          *ngIf="selectedDays.length > 0 || isEditing || showDelivery">
          <div class="flex items-center gap-2 mg-text-muted text-sm h-8">
            <app-icon name="local_shipping" size="md" class="text-primary"></app-icon>
            <span>Día de reparto</span>
          </div>
          <div class="flex flex-wrap gap-1 items-center -ml-2">
            <div
              *ngFor="let day of daysOptions"
              (click)="isEditing && toggleDay('delivery', day.value)"
              class="px-2 py-1 rounded text-xs transition-colors border select-none shrink-0"
              [ngClass]="{
                'cursor-pointer': isEditing,
                'cursor-default': !isEditing,
                'bg-primary text-primary-contrast border-primary': isDaySelected('delivery', day.value),
                'bg-surface-100 dark:bg-surface-800 mg-text-muted border-transparent':
                  !isDaySelected('delivery', day.value) && !isEditing,
                'bg-surface-100 dark:bg-surface-800 mg-text-muted border-transparent hover:bg-surface-200 dark:bg-surface-700':
                  !isDaySelected('delivery', day.value) && isEditing
              }">
              {{ day.short }}
            </div>
          </div>
        </div>

        <!-- Pedido minimo Inline -->
        <div
          class="grid grid-cols-[130px_1fr] items-center py-1 group min-h-[32px]"
          *ngIf="
            (supplier!.minPriceDelivery !== null && supplier!.minPriceDelivery !== undefined) ||
            isEditing ||
            showDelivery
          ">
          <div class="flex items-center gap-2 mg-text-muted text-sm">
            <app-icon name="euro" size="md" class="text-primary"></app-icon>
            <span>Pedido mín.</span>
          </div>
          <div class="flex items-center -ml-2">
            <div class="flex items-center w-full">
              <p-inputNumber
                [(ngModel)]="supplier!.minPriceDelivery"
                mode="currency"
                currency="EUR"
                locale="es-ES"
                placeholder="0,00 €"
                [minFractionDigits]="2"
                [maxFractionDigits]="2"
                styleClass="w-24"
                [disabled]="!isEditing"
                inputStyleClass="bg-transparent border-b border-surface hover:border-primary focus:border-primary mg-text font-medium focus:outline-none px-1 py-0.5 w-full transition-all placeholder:mg-text-muted placeholder:italic text-sm !shadow-none !rounded-none">
              </p-inputNumber>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
