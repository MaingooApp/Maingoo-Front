<!-- ========== SECCIÓN MENÚ DE NAVEGACIÓN ========== -->
<div class="flex-shrink-0 px-4 pt-4 pb-3">
  <!-- Etiqueta MENU -->
  <div class="mb-3">
    <p class="text-xs font-semibold mg-text-muted uppercase tracking-wide mb-0">Menú</p>
    <div class="h-px bg-surface-200 dark:bg-surface-700 mt-2"></div>
  </div>

  <!-- Chips compactos (Siempre visibles) -->
  <div class="grid grid-cols-3 gap-2">
    @for (link of filteredLinks; track link.route) {
      <a
        [routerLink]="link.route"
        routerLinkActive="!text-primary !shadow-[0_6px_16px_rgba(26,60,52,0.1)]"
        class="mg-sidebar-chip"
        [ngClass]="link.comingSoon ? 'mg-sidebar-chip-soon' : 'mg-sidebar-chip-default'">
        <app-icon [name]="link.icon" size="sm"></app-icon>
        <span class="text-[10px] font-medium whitespace-nowrap">{{ link.label }}</span>
        @if (link.comingSoon) {
          <app-icon name="construction" size="xs" class="text-amber-500"></app-icon>
        }
      </a>
    }
  </div>
</div>
