<!-- ========== SECCIÓN NOTIFICACIONES ========== -->

<!-- Marcar todas como leídas -->
@if (notifications.length > 0) {
  <div class="flex-shrink-0 px-4 py-2 flex justify-end">
    <button
      (click)="clearAllNotifications()"
      class="text-xs font-medium text-primary hover:text-primary-emphasis dark:hover:text-surface-0 transition-colors">
      Marcar todas como leídas
    </button>
  </div>
}

<!-- Lista de notificaciones -->
<div class="flex-1 min-h-0 overflow-y-auto">
  @if (notifications.length === 0) {
    <!-- Estado vacío -->
    <div class="flex flex-col items-center justify-center h-full p-8 text-center">
      <div
        class="w-14 h-14 bg-surface-0 dark:bg-surface-700 rounded-full flex items-center justify-center mb-4 shadow-sm">
        <app-icon name="notifications_off" size="xl" class="mg-icon-muted"></app-icon>
      </div>
      <p class="text-sm font-medium mg-text">Sin notificaciones</p>
      <p class="text-xs mt-1 mg-text-muted">No tienes notificaciones pendientes.</p>
    </div>
  } @else {
    <!-- Lista de notificaciones -->
    <div class="flex flex-col gap-2 p-4">
      @for (notification of notifications; track notification.id) {
        <button
          type="button"
          (click)="selectNotification(notification)"
          class="w-full p-3 bg-surface-0 dark:bg-surface-700 rounded-content shadow-sm hover:shadow-md transition-all text-left"
          [class.ring-1]="!notification.readAt"
          [class.ring-primary]="!notification.readAt">
          <div class="flex gap-3">
            <!-- Icono de estado -->
            <div
              [class]="
                'w-8 h-8 rounded-full flex items-center justify-center shrink-0 ' +
                (notification.priority === 'CRITICAL'
                  ? 'bg-red-100 dark:bg-red-900/30'
                  : notification.priority === 'WARNING'
                    ? 'bg-orange-100 dark:bg-orange-900/30'
                    : 'bg-blue-100 dark:bg-blue-900/30')
              ">
              <app-icon
                [name]="getPriorityIcon(notification.priority)"
                size="sm"
                [class]="
                  notification.priority === 'CRITICAL'
                    ? 'text-red-600'
                    : notification.priority === 'WARNING'
                      ? 'text-orange-600'
                      : 'text-blue-600'
                ">
              </app-icon>
            </div>

            <!-- Contenido -->
            <div class="flex-1 min-w-0">
              <div class="flex justify-between items-start mb-0.5">
                <p class="text-xs font-semibold mg-text leading-tight pr-2 truncate">
                  {{ notification.title }}
                </p>
                <span class="text-[10px] mg-text-muted whitespace-nowrap">{{
                  formatTime(notification.createdAt)
                }}</span>
              </div>

              <p class="text-xs mg-text-muted leading-relaxed line-clamp-2">{{ notification.body }}</p>
            </div>
          </div>
        </button>
      }
    </div>
  }
</div>
