<!-- ==================== SIDEBAR PRINCIPAL ==================== -->
<app-sidebar-shell>
  <!-- Menú de navegación rápida -->
  <app-sidebar-menu [quickLinks]="quickLinks"></app-sidebar-menu>

  <!-- Tabs: Maingoo AI / Notificaciones -->
  <div class="flex-shrink-0 px-4 py-3">
    <div class="flex gap-1 p-1 bg-surface-0/60 dark:bg-surface-800/70 rounded-full">
      <!-- Tab Maingoo AI -->
      <button
        (click)="setActiveTab('chat')"
        class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-full text-xs font-semibold transition-all duration-200"
        [ngClass]="
          activeTab() === 'chat'
            ? 'bg-surface-0 dark:bg-surface-700 shadow-sm text-primary'
            : 'mg-text-muted hover:text-surface-700 dark:hover:text-surface-200'
        ">
        <app-icon name="smart_toy" size="sm"></app-icon>
        <span>Maingoo AI</span>
      </button>

      <!-- Tab Notificaciones -->
      <button
        (click)="setActiveTab('notifications')"
        class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-full text-xs font-semibold transition-all duration-200 relative"
        [ngClass]="
          activeTab() === 'notifications'
            ? 'bg-surface-0 dark:bg-surface-700 shadow-sm text-primary'
            : 'mg-text-muted hover:text-surface-700 dark:hover:text-surface-200'
        ">
        <app-icon name="notifications" size="sm"></app-icon>
        <span>Notificaciones</span>
        <!-- Badge de notificaciones -->
        @if (unreadNotifications() > 0 && activeTab() !== 'notifications') {
        <span
          class="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 bg-red-500 rounded-full text-[10px] font-bold text-white flex items-center justify-center">
          {{ unreadNotifications() > 9 ? '9+' : unreadNotifications() }}
        </span>
        }
      </button>
    </div>
    <div class="h-px bg-surface-200 dark:bg-surface-700 mt-3"></div>
  </div>

  <!-- Contenido según tab activo -->
  @if (activeTab() === 'chat') {
  <!-- Chat de Maingoo AI -->
  <app-sidebar-chat class="flex-1 min-h-0 flex flex-col"> </app-sidebar-chat>
  } @else {
  <!-- Notificaciones -->
  <app-sidebar-notifications
    class="flex-1 min-h-0 flex flex-col"
    [notifications]="notifications"
    (clearAll)="clearAllNotifications()">
  </app-sidebar-notifications>
  }
</app-sidebar-shell>
<!-- ==================== FIN SIDEBAR ==================== -->
