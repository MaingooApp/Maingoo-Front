<!-- ========== SECCIÓN CHAT ========== -->

<!-- Área de mensajes expandida -->
<div id="chat-messages-expanded" class="flex-1 min-h-0 p-4 overflow-y-auto">
  <!-- Mensajes dinámicos -->
  @for (message of messages; track message.id; let idx = $index) {
    @if (message.sender === 'bot') {
      <!-- Mensaje del BOT -->
      <div class="flex items-start space-x-2 mb-3 animate-[fadeIn_0.3s_ease-out]">
        <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0">
          <img src="assets/images/maingoo_logo.svg" alt="Maingoo Logo" class="w-6 h-6 object-contain" />
        </div>
        <div class="max-w-[80%] bg-surface-0 dark:bg-surface-700 mg-text shadow-sm rounded-content rounded-tl-none p-3">
          <p class="m-0 whitespace-pre-line break-words text-sm leading-relaxed">{{ message.text }}</p>
        </div>
      </div>
    } @else {
      <!-- Mensaje del USUARIO -->
      <div class="flex items-start space-x-2 mb-3 justify-end animate-[fadeIn_0.3s_ease-out]">
        <div class="max-w-[80%] bg-primary text-primary-contrast shadow-sm rounded-content rounded-tr-none p-3">
          <p class="m-0 whitespace-pre-line break-words text-sm leading-relaxed">{{ message.text }}</p>
        </div>
        <div class="w-6 h-6 bg-primary rounded-full flex items-center justify-center flex-shrink-0">
          <app-icon name="person" size="xs" class="text-primary-contrast"></app-icon>
        </div>
      </div>
    }
  }

  <!-- Indicador de escritura -->
  @if (isTyping) {
    <div class="flex items-start space-x-2 mb-3">
      <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0">
        <img src="assets/images/maingoo_logo.svg" alt="Maingoo Logo" class="w-6 h-6 object-contain" />
      </div>
      <div class="bg-surface-0 dark:bg-surface-700 rounded-content rounded-tl-none p-3 shadow-sm">
        <div class="flex space-x-1">
          <div class="w-2 h-2 bg-primary rounded-full animate-bounce"></div>
          <div class="w-2 h-2 bg-primary rounded-full animate-bounce [animation-delay:0.1s]"></div>
          <div class="w-2 h-2 bg-primary rounded-full animate-bounce [animation-delay:0.2s]"></div>
        </div>
      </div>
    </div>
  }
</div>

<!-- Spacer para modo compacto -->
<!-- Spacer para modo compacto - Eliminado -->

<!-- Acción contextual -->
<div class="flex-shrink-0 px-4 pt-3 pb-2">
  <button
    type="button"
    (click)="openInvoiceUpload()"
    class="w-full px-3 py-2.5 bg-primary/10 dark:bg-primary/20 text-primary text-sm font-semibold rounded-content hover:bg-primary/20 dark:hover:bg-primary/30 transition-all duration-200 flex items-center justify-center gap-2 text-center">
    <app-icon name="receipt_long" size="sm"></app-icon>
    <span>Subir factura</span>
  </button>
</div>

<!-- Input de mensaje expandido -->
<div class="flex-shrink-0 px-4 pt-2 pb-5">
  <div class="flex items-center gap-3">
    <textarea
      #messageInput
      [(ngModel)]="messageText"
      (keydown)="handleKeyDown($event)"
      (input)="autoResize()"
      (focus)="onChatInputFocus()"
      [placeholder]="placeholder"
      [maxlength]="maxMessageLength"
      rows="1"
      class="flex-1 px-3 py-2 border-0 outline-none text-sm bg-surface-0/60 dark:bg-surface-700/60 rounded-content placeholder:text-surface-500 dark:placeholder:text-surface-400 mg-text resize-none overflow-hidden max-h-32">
    </textarea>

    <!-- Botón de enviar circular -->
    <button
      (click)="sendMessage()"
      [disabled]="!messageText.trim() || isTyping"
      class="flex-shrink-0 w-10 h-10 rounded-full bg-primary flex items-center justify-center hover:bg-primary-emphasis transition-all disabled:opacity-50 disabled:cursor-not-allowed"
      aria-label="Enviar mensaje">
      <app-icon name="send" size="md" class="text-primary-contrast"></app-icon>
    </button>
  </div>

  @if (messageText.length > 300) {
    <div
      class="text-xs text-right mt-2 px-2 mg-text-muted"
      [class.!text-red-500]="messageText.length >= maxMessageLength">
      {{ messageText.length }} / {{ maxMessageLength }}
    </div>
  }
</div>
