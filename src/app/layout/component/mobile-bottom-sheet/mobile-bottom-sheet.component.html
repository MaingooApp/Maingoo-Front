<!-- Contenedor del Chat Mobile -->
<div
  class="chat-modal-container"
  (click)="$event.stopPropagation()"
  role="dialog"
  aria-modal="true"
  aria-label="Chat con Maingoo AI">
  <!-- Header con título y botón de cerrar -->
  <div class="chat-header">
    <div class="flex items-center gap-2">
      <app-icon name="auto_awesome" size="md" class="text-primary"></app-icon>
      <p class="text-sm font-semibold mg-text mb-0">Maingoo AI</p>
    </div>

    <button
      type="button"
      (click)="logout()"
      class="w-10 h-10 flex items-center justify-center rounded-full bg-red-50 text-red-500 dark:bg-red-500/15 dark:text-red-300 hover:bg-red-100 dark:hover:bg-red-500/25 transition-all shadow-sm"
      aria-label="Cerrar sesión">
      <app-icon name="logout" size="md"></app-icon>
    </button>
  </div>

  <!-- Controles de conversación -->
  <div class="chat-conversations">
    <div class="flex items-center mb-1">
      <button
        (click)="startNewConversation()"
        class="px-3 py-1.5 text-xs font-semibold rounded-full bg-primary text-primary-contrast hover:bg-primary-emphasis transition-colors"
        type="button">
        Nuevo chat
      </button>
    </div>
  </div>

  <!-- Mensajes del chat -->
  <div #messagesContainer class="chat-messages">
    <div
      *ngFor="let message of messages; trackBy: trackByMessageId"
      class="message-wrapper"
      [class.bot-wrapper]="message.sender === 'bot'"
      [class.user-wrapper]="message.sender === 'user'">
      <div *ngIf="message.sender === 'bot'" class="flex items-start space-x-2 mb-3 animate-[fadeIn_0.3s_ease-out]">
        <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0">
          <img src="assets/images/maingoo_logo.svg" alt="Maingoo Logo" class="w-6 h-6 object-contain" />
        </div>
        <div
          class="max-w-[80%] bg-surface-0 dark:bg-surface-700 mg-text shadow-sm rounded-content rounded-tl-none p-3"
          role="article"
          aria-label="Mensaje de Maingoo AI">
          <p class="m-0 whitespace-pre-line break-words text-sm leading-relaxed">{{ message.text }}</p>
        </div>
      </div>

      <div
        *ngIf="message.sender === 'user'"
        class="flex items-start space-x-2 mb-3 justify-end animate-[fadeIn_0.3s_ease-out]">
        <div
          class="max-w-[80%] bg-primary text-primary-contrast shadow-sm rounded-content rounded-tr-none p-3"
          role="article"
          aria-label="Tu mensaje">
          <p class="m-0 whitespace-pre-line break-words text-sm leading-relaxed">{{ message.text }}</p>
        </div>
        <div class="w-6 h-6 bg-primary rounded-full flex items-center justify-center flex-shrink-0">
          <app-icon name="person" size="xs" class="text-primary-contrast" aria-hidden="true"></app-icon>
        </div>
      </div>
    </div>

    <div
      class="flex items-start space-x-2 mb-3"
      *ngIf="isTyping"
      role="status"
      aria-live="polite"
      aria-label="Maingoo está escribiendo">
      <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0">
        <img src="assets/images/maingoo_logo.svg" alt="Maingoo Logo" class="w-6 h-6 object-contain" />
      </div>
      <div class="bg-surface-0 dark:bg-surface-700 rounded-content rounded-tl-none p-3 shadow-sm">
        <div class="flex space-x-1">
          <div class="w-2 h-2 bg-primary rounded-full animate-bounce" aria-hidden="true"></div>
          <div class="w-2 h-2 bg-primary rounded-full animate-bounce [animation-delay:0.1s]" aria-hidden="true"></div>
          <div class="w-2 h-2 bg-primary rounded-full animate-bounce [animation-delay:0.2s]" aria-hidden="true"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Acción contextual -->
  <div class="invoice-action-container">
    <div class="invoice-upload-wrapper">
      <button
        class="invoice-upload-button"
        type="button"
        aria-label="Subir factura"
        [attr.aria-expanded]="showInvoiceUploadOptions"
        [disabled]="isUploadingInvoice"
        (click)="toggleInvoiceUploadOptions()">
        <app-icon
          [name]="isUploadingInvoice ? 'hourglass_top' : 'receipt_long'"
          size="md"
          aria-hidden="true"></app-icon>
        <span>Subir factura</span>
      </button>

      <div *ngIf="showInvoiceUploadOptions" class="invoice-upload-options">
        <button type="button" class="invoice-upload-option" (click)="chooseInvoiceFile()">
          <app-icon name="upload_file" size="sm" aria-hidden="true"></app-icon>
          <span>Archivo</span>
        </button>
        <button type="button" class="invoice-upload-option" (click)="captureInvoicePhoto()">
          <app-icon name="photo_camera" size="sm" aria-hidden="true"></app-icon>
          <span>Foto</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Input del chat -->
  <div class="chat-input-container">
    <input
      #fileInput
      type="file"
      accept="image/*,application/pdf"
      (change)="onInvoiceFileSelected($event)"
      class="hidden" />
    <input
      #cameraInput
      type="file"
      accept="image/*"
      capture="environment"
      (change)="onInvoicePhotoCaptured($event)"
      class="hidden" />

    <input
      #chatInput
      type="text"
      placeholder="Escribe tu mensaje..."
      aria-label="Escribe tu mensaje"
      class="flex-1 px-4 py-3 bg-surface-0 dark:bg-surface-700 border-0 outline-0 text-sm mg-text rounded-full shadow-sm focus:shadow-md transition-all"
      (keydown.enter)="sendMessage(chatInput)" />

    <button
      (click)="sendMessage(chatInput)"
      [disabled]="isTyping"
      type="button"
      aria-label="Enviar mensaje"
      class="flex-shrink-0 w-10 h-10 rounded-full bg-primary flex items-center justify-center hover:bg-primary-emphasis transition-all disabled:opacity-50 disabled:cursor-not-allowed">
      <app-icon
        name="send"
        size="sm"
        class="text-primary-contrast"
        [class.animate-send]="isSending"
        aria-hidden="true"></app-icon>
    </button>
  </div>
</div>
